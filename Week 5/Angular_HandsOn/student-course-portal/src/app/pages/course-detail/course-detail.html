<div *ngIf="course">

    <h2>

        {{course.name}}

    </h2>

    <hr>

    <p>

        <strong>ID :</strong>

        {{course.id}}

    </p>

    <p>

        <strong>Course Code :</strong>

        {{course.code}}

    </p>

    <p>

        <strong>Credits :</strong>

        {{course.credits}}

    </p>

    <p>

        <strong>Status :</strong>

        {{course.gradeStatus}}

    </p>

</div>

<div *ngIf="!course">

    <h2>

        Course Not Found

    </h2>

</div>
