<h1>Available Courses</h1>

<div *ngIf="isLoading" class="loading-container">

  <div class="spinner"></div>

  <p>Loading Courses...</p>

</div>

<p
  *ngIf="errorMessage"
  style="color:red">

  {{ errorMessage }}

</p>

<div *ngIf="!isLoading">

  <app-course-card
    *ngFor="let course of courses; trackBy: trackByCourseId"
    [course]="course">

  </app-course-card>

</div>
