<h1>Available Courses</h1>

<!-- Loading -->

<p *ngIf="isLoading">

Loading courses...

</p>

<!-- Courses -->

<div *ngIf="!isLoading">

    <div *ngIf="courses.length>0; else noCourses">

        <app-course-card

            *ngFor="let course of courses;
                     let i=index;
                     trackBy:trackByCourseId"

            [course]="course">

        </app-course-card>

    </div>

</div>

<!-- Else Block -->

<ng-template #noCourses>

    <p>

        No courses available.

    </p>

</ng-template>
