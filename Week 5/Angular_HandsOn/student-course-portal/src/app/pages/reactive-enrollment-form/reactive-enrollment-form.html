<h1>Reactive Enrollment Form</h1>

<form
[formGroup]="enrollForm"
(ngSubmit)="onSubmit()">

    <!-- Name -->

    <label>

        Student Name

    </label>

    <input
        type="text"
        formControlName="studentName">

    <br><br>

    <!-- Email -->

    <label>

        Student Email

    </label>

    <input
        type="email"
        formControlName="studentEmail">

    <span
    *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">

        Email already taken

    </span>

    <br><br>

    <!-- Course ID -->

    <label>

        Course ID

    </label>

    <input
        type="text"
        formControlName="courseId">

    <span
    *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">

        Course code starting with XX is not allowed.

    </span>

    <br><br>

    <!-- Semester -->

    <label>

        Preferred Semester

    </label>

    <select
        formControlName="preferredSemester">

        <option value="Odd">

            Odd

        </option>

        <option value="Even">

            Even

        </option>

    </select>

    <br><br>

    <!-- Checkbox -->

    <label>

        <input
        type="checkbox"
        formControlName="agreeToTerms">

        I Agree to the Terms

    </label>

    <br><br>

    <!-- FormArray -->

    <h3>

        Additional Courses

    </h3>

    <button
    type="button"
    (click)="addCourse()">

        Add Another Course

    </button>

    <br><br>

    <div
    *ngFor="let ctrl of additionalCourses.controls;
             let i=index">

        <input
        [formControl]="ctrl">

        <button
        type="button"
        (click)="removeCourse(i)">

            Remove

        </button>

        <br><br>

    </div>

    <!-- Submit -->

    <button
    type="submit"
    [disabled]="enrollForm.invalid">

        Submit

    </button>

</form>
