<!-- String Interpolation -->
<h1>{{ portalName }}</h1>

<p>
Welcome to the Student Course Portal.
Manage your courses and monitor your academic progress.
</p>

<hr>

<!-- Property Binding + Event Binding -->

<button
    [disabled]="!isPortalActive"
    (click)="onEnrollClick()">

    Enroll Now

</button>

<p>{{ message }}</p>

<hr>

<!-- Two-Way Binding -->

<label>Search Course</label>

<br><br>

<input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Enter course name">

<p>
Searching for:
<strong>{{ searchTerm }}</strong>
</p>
