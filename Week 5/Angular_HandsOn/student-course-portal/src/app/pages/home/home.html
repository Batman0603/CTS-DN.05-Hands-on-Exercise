<h1>{{ portalName }}</h1>

<p>
Welcome to Student Course Portal
</p>

<p>

<strong>Available Courses :</strong>

{{ availableCourses }}

</p>

<hr>

<button
[disabled]="!isPortalActive"
(click)="onEnrollClick()">

Enroll Now

</button>

<p>{{ message }}</p>

<hr>

<input
type="text"
[(ngModel)]="searchTerm"
placeholder="Search Course">

<p>

Searching for :

{{ searchTerm }}

</p>
