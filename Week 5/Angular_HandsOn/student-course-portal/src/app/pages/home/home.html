<h1>{{ portalName }}</h1>

<p>
  Welcome to the Student Course Portal.
</p>

<button
(click)="onEnrollClick()"
[disabled]="!isPortalActive">

    Enroll Now

</button>

<p>{{ message }}</p>

<input
type="text"
[(ngModel)]="searchTerm"
placeholder="Search Course">

<p>

Searching for :

<strong>{{searchTerm}}</strong>

</p>

<div class="section">

<h2>Statistics</h2>

<div class="stats-grid">

<div class="stat-card">

<h2>{{coursesCount}}</h2>

<p>Courses</p>

</div>

<div class="stat-card">

<h2>3</h2>

<p>Enrolled</p>

</div>

<div class="stat-card">

<h2>3.8</h2>

<p>GPA</p>

</div>

</div>

</div>

<div class="widget">

<app-course-summary-widget>

</app-course-summary-widget>

</div>

<div class="widget">

<app-notification>

</app-notification>

</div>
