<div

class="card"

[ngClass]="cardClasses"

[ngStyle]="{

'border-left':

course.gradeStatus=='passed'
? '8px solid green'

: course.gradeStatus=='failed'
? '8px solid red'

: '8px solid gray'

}">

<h2>

{{course.name}}

</h2>

<p>

Code :

{{course.code}}

</p>

<p>

Credits :

{{course.credits | creditLabel}}

</p>

<!-- Grade Badge -->

<div [ngSwitch]="course.gradeStatus">

<span
*ngSwitchCase="'passed'"
class="passed">

Passed

</span>

<span
*ngSwitchCase="'failed'"
class="failed">

Failed

</span>

<span
*ngSwitchCase="'pending'"
class="pending">

Pending

</span>

</div>

<br>

<!-- Enrollment Button -->

<button

(click)="toggleEnrollment()">

{{

enrollmentService.isEnrolled(course.id)

?

'Unenroll'

:

'Enroll'

}}

</button>

<button

(click)="toggleDetails()">

{{

isExpanded

?

'Hide Details'

:

'Show Details'

}}

</button>

<!-- Expanded Section -->

<div *ngIf="isExpanded">

<hr>

<p>

Course ID :

{{course.id}}

</p>

<p>

Course Credits :

{{course.credits}}

</p>

<p>

Status :

{{course.gradeStatus}}

</p>

</div>

</div>
