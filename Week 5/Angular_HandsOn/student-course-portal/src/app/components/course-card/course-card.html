<div

class="card"

[ngClass]="cardClasses"

[ngStyle]="{

'border-left':

enrollmentService.isEnrolled(course.id)

? '8px solid green'

: course.gradeStatus=='failed'

? '8px solid red'

: course.gradeStatus=='passed'

? '8px solid green'

: '8px solid gray'

}"

(click)="openCourse()">

<h2>

{{course.name}}

</h2>

<p>

Code :

{{course.code}}

</p>

<p>

Credits :

{{course.credits | creditLabel}}

</p>

<div [ngSwitch]="course.gradeStatus">

<span

*ngSwitchCase="'passed'"

class="passed">

Passed

</span>

<span

*ngSwitchCase="'failed'"

class="failed">

Failed

</span>

<span

*ngSwitchCase="'pending'"

class="pending">

Pending

</span>

</div>

<br>

<!-- stopPropagation prevents the card click -->

<button

(click)="$event.stopPropagation(); toggleEnrollment()">

{{ enrollmentService.isEnrolled(course.id) ? 'Unenroll' : 'Enroll' }}

</button>

<button

(click)="$event.stopPropagation(); toggleDetails()">

Show Details

</button>

<div *ngIf="isExpanded">

<hr>

<p>

Course ID :

{{course.id}}

</p>

<p>

Credits :

{{course.credits}}

</p>

</div>

</div>
